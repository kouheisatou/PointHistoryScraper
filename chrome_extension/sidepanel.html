<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽天ポイント履歴</title>
<link rel="stylesheet" href="sidepanel.css">
</head>

<body>
<header class="header">
<h1>楽天ポイント履歴</h1>
</header>

<nav class="tabs">
<button class="tab active" data-tab="home">ダッシュボード</button>
<div class="tab-wrap">
<button class="tab" data-tab="history">履歴</button>
<div id="exportCallout" class="callout hidden">CSVのエクスポートはこちら</div>
</div>
</nav>

<!-- ホームタブ -->
<div id="tab-home" class="tab-content active">

<section class="block actions">
<button id="dashboardExportButton" type="button">全期間CSVエクスポート</button>
<label class="force-full">
<input type="checkbox" id="forceFullScrape">
<span>強制的に全期間取得する</span>
</label>
</section>

<section class="block dashboard">
<div class="dashboard-header">
<h2>全期間</h2>
<div class="dashboard-share">
<button id="totalShareImage" class="share-btn" type="button" title="画像として保存"><img src="share.svg" alt="共有" width="16" height="16"></button>
<button id="totalShareX" class="share-btn share-btn-x" type="button" title="Xで共有"><img src="x.svg" alt="Xで共有" width="14" height="14"></button>
</div>
</div>
<div class="metrics cols-3">
<div class="metric accent-green">
<div class="metric-label">獲得合計</div>
<div id="metricTotalGain" class="metric-value">-</div>
</div>
<div class="metric accent-blue">
<div class="metric-label">累計チャージ額</div>
<div id="metricTotalCharge" class="metric-value">-</div>
</div>
<div class="metric accent-red">
<div class="metric-label">合計利用額</div>
<div id="metricTotalUsed" class="metric-value">-</div>
</div>
</div>
<div class="metrics cols-3 mt-8">
<div class="metric">
<div class="metric-label">ポイント利息累計</div>
<div id="metricInterest" class="metric-value">-</div>
</div>
<div class="metric">
<div class="metric-label">月平均獲得</div>
<div id="metricAvgGain" class="metric-value">-</div>
</div>
<div class="metric">
<div class="metric-label">月平均利用</div>
<div id="metricAvgUsed" class="metric-value">-</div>
</div>
</div>
</section>

<section class="block dashboard">
<div class="dashboard-header">
<h2>今年</h2>
<div class="dashboard-share">
<button id="yearShareImage" class="share-btn" type="button" title="画像として保存"><img src="share.svg" alt="共有" width="16" height="16"></button>
<button id="yearShareX" class="share-btn share-btn-x" type="button" title="Xで共有"><img src="x.svg" alt="Xで共有" width="14" height="14"></button>
</div>
</div>
<div class="metrics cols-3">
<div class="metric accent-green">
<div class="metric-label">獲得合計</div>
<div id="metricYearGain" class="metric-value">-</div>
</div>
<div class="metric accent-blue">
<div class="metric-label">累計チャージ額</div>
<div id="metricYearCharge" class="metric-value">-</div>
</div>
<div class="metric accent-red">
<div class="metric-label">合計利用額</div>
<div id="metricYearUsed" class="metric-value">-</div>
</div>
</div>
</section>

<div id="shareToast" class="share-toast hidden"></div>

<section class="block chart-section">
<div class="chart-header">
<button id="monthlyPrev" class="nav-btn" type="button">&lt;</button>
<h2 id="monthlyTitle">月別推移</h2>
<button id="monthlyNext" class="nav-btn" type="button">&gt;</button>
<div class="chart-share">
<button id="monthlyShare" class="share-btn" type="button" title="画像として保存"><img src="share.svg" alt="共有" width="16" height="16"></button>
<button id="monthlyShareX" class="share-btn share-btn-x" type="button" title="Xで共有"><img src="x.svg" alt="Xで共有" width="14" height="14"></button>
</div>
</div>
<canvas id="chartMonthly"></canvas>
</section>

<section class="block chart-section">
<div class="chart-header">
<div>
<h2>サービス別獲得ポイント</h2>
<div class="donut-period-row">
<span id="servicePeriod" class="chart-period"></span>
<button id="donutPeriodToggle" class="period-toggle-btn" type="button" title="期間を変更">&#9660;</button>
</div>
</div>
<div class="chart-share">
<button id="serviceShare" class="share-btn" type="button" title="画像として保存"><img src="share.svg" alt="共有" width="16" height="16"></button>
<button id="serviceShareX" class="share-btn share-btn-x" type="button" title="Xで共有"><img src="x.svg" alt="Xで共有" width="14" height="14"></button>
</div>
</div>
<div id="donutPeriodPanel" class="filters donut-period-panel hidden">
<label for="donutFromDate">開始日</label>
<input id="donutFromDate" type="date">
<label for="donutToDate">終了日</label>
<input id="donutToDate" type="date">
</div>
<canvas id="chartService"></canvas>
</section>

<section class="block chart-section">
<div class="chart-header">
<div>
<h2>詳細別利用ポイント</h2>
<div class="donut-period-row">
<span id="usedPeriod" class="chart-period"></span>
<button id="usedDonutPeriodToggle" class="period-toggle-btn" type="button" title="期間を変更">&#9660;</button>
</div>
</div>
<div class="chart-share">
<button id="usedShare" class="share-btn" type="button" title="画像として保存"><img src="share.svg" alt="共有" width="16" height="16"></button>
<button id="usedShareX" class="share-btn share-btn-x" type="button" title="Xで共有"><img src="x.svg" alt="Xで共有" width="14" height="14"></button>
</div>
</div>
<div id="usedDonutPeriodPanel" class="filters donut-period-panel hidden">
<label for="usedDonutFromDate">開始日</label>
<input id="usedDonutFromDate" type="date">
<label for="usedDonutToDate">終了日</label>
<input id="usedDonutToDate" type="date">
</div>
<canvas id="chartUsed"></canvas>
</section>

</div>

<!-- 履歴タブ -->
<div id="tab-history" class="tab-content">

<section class="block export">
<div class="filters">
<label for="fromDate">開始日</label>
<input id="fromDate" type="date">
<label for="toDate">終了日</label>
<input id="toDate" type="date">
</div>
<div id="yearShortcuts" class="year-shortcuts"></div>
<div id="serviceShortcuts" class="year-shortcuts"></div>
<div id="actionShortcuts" class="year-shortcuts"></div>
<div class="buttons">
<button id="exportCsvButton" type="button" class="primary">CSVダウンロード</button>
<button id="exportXlsxButton" type="button" class="primary">Excelダウンロード</button>
</div>
</section>

<section class="block history">
<div class="history-header">
<h2>履歴一覧</h2>
<span id="historyCount" class="badge">0件</span>
</div>
<div id="historyEmpty" class="empty">表示できる履歴がありません</div>
<div class="table-wrap">
<table>
<thead>
<tr>
<th class="sortable" data-sort="date">日付 <span class="sort-arrow"></span></th>
<th>サービス</th>
<th>詳細</th>
<th>種別</th>
<th class="sortable" data-sort="point">ポイント <span class="sort-arrow"></span></th>
<th>備考</th>
</tr>
</thead>
<tbody id="historyTableBody"></tbody>
</table>
</div>
</section>

<section class="import-section">
<div class="import-row">
<span class="import-label">CSVインポート（複数選択可）</span>
<button id="importCsvButton" type="button" class="link-btn">ファイルを選択</button>
<input id="importCsvInput" type="file" accept=".csv" multiple hidden>
</div>
<div id="importStatus" class="import-status hidden"></div>
</section>

</div>

<div id="chartTooltip" class="chart-tooltip hidden"></div>

<div id="infoOverlay" class="overlay hidden">
<div class="dialog">
<div class="dialog-header">
<h2 id="infoTitle">お知らせ</h2>
<button id="infoClose" class="dialog-close" type="button" aria-label="閉じる">×</button>
</div>
<div class="dialog-body">
<p id="infoMessage" class="dialog-message"></p>
</div>
<div class="dialog-footer">
<button id="infoOk" type="button" class="primary">OK</button>
</div>
</div>
</div>

<script src="xlsx.mini.min.js"></script>
<script src="sidepanel.js"></script>
</body>

</html>
