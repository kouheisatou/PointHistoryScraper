<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楽天ポイント履歴 サイドパネル</title>
<link rel="stylesheet" href="sidepanel.css">
</head>

<body>
<header class="header">
<h1>楽天ポイント履歴</h1>
<button id="refreshButton" type="button">更新</button>
</header>

<section class="block actions">
<h2>取得</h2>
<button id="startScrapeButton" type="button">取得開始</button>
</section>

<section class="block dashboard">
<h2>ダッシュボード</h2>
<div class="metrics">
<div class="metric">
<div class="metric-label">保存件数</div>
<div id="metricTotal" class="metric-value">0</div>
</div>
<div class="metric">
<div class="metric-label">表示件数</div>
<div id="metricVisible" class="metric-value">0</div>
</div>
<div class="metric">
<div class="metric-label">期間（最古）</div>
<div id="metricMinDate" class="metric-value">-</div>
</div>
<div class="metric">
<div class="metric-label">期間（最新）</div>
<div id="metricMaxDate" class="metric-value">-</div>
</div>
</div>
</section>

<section class="block export">
<h2>エクスポート</h2>
<div class="filters">
<label for="fromDate">開始日</label>
<input id="fromDate" type="date">
<label for="toDate">終了日</label>
<input id="toDate" type="date">
</div>
<div class="buttons">
<button id="applyFilterButton" type="button">絞り込み</button>
<button id="clearFilterButton" type="button">絞り込み解除</button>
<button id="exportCsvButton" type="button">CSVエクスポート</button>
</div>
</section>

<section class="block history">
<h2>履歴</h2>
<div id="historyEmpty" class="empty">表示できる履歴がありません</div>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>date</th>
<th>service</th>
<th>title</th>
<th>action</th>
<th>point</th>
<th>note</th>
</tr>
</thead>
<tbody id="historyTableBody"></tbody>
</table>
</div>
</section>

<script src="sidepanel.js"></script>
</body>

</html>
